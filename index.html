<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTimer</title>
  
</head>
<body>
  <main>
    <div id="timer">
      <span class="minutes">25</span>
      <span>:</span>
      <span class="seconds">00</span>
    </div>
    <div id="controls">
      <button class="play"><img src="./assets/play.svg" alt="Play"></button>
      <button class="pause"><img src="./assets/pause.svg" alt="Pause"></button>
      <button class="stop"><img src="./assets/stop.svg" alt="Stop"></button>
      <button class="set"><img src="./assets/set.svg" alt="Configurar temporizador"></button>
    </div>
  </main>

  <footer>
    <button class="sound-on"><img src="./assets/sound-on.svg" alt="Botão para ligar o som"></button>
    <button class="sound-off"><img src="./assets/sound-off.svg" alt="Botão para desligar o som"></button>
  </footer>
  
</body>
</html>
